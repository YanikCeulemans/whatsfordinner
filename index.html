<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Whats for dinner</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@dragdroptouch/drag-drop-touch@latest/dist/drag-drop-touch.esm.min.js?autoload"
      type="module"
    ></script>
    <script src="index.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css"
    >

    <!--
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    -->

    <style>
      .flex { display: flex; }
      .flex-1 { flex: 1; }
      .column { flex-direction: column; }
      .spaced { gap: 15px; }
      .padded { padding: 10px; }
      .justify-center { justify-content: center; }
      .items-center { align-items: center; }
      .no-list-style { list-style-type: none; }
      .no-padding { padding: 0; }
      .justify-space-between { justify-content: space-between; }
      .checked { text-decoration: line-through; }
      body > div {
        header, main, footer {
          padding-block: var(--pico-block-spacing-vertical);
        }
      }
      footer {
        position: sticky;
        bottom: 0;
        background-color: var(--pico-background-color);
      }

      .transparent-border { border: 2px solid transparent; }
      .add-above-border { border-top: 2px solid green; }
      .add-below-border { border-bottom: 2px solid green; }
      .fab { 
        --pico-border-radius: 50%;
        position: sticky;
        bottom: 80px;
        flex: 0;
        aspect-ratio: 1 / 1;
        align-self: end;
        box-shadow: 0 0 5px 1px black;
      }

      .groceries-list article {
        margin: 0;
        padding: 0;
      }
      .grocery-description {
        flex: 1 0 auto;
        margin: 0;
        align-self: stretch;
        display: flex;
        align-items: center;
        padding: var(--pico-block-spacing-vertical) var(--pico-block-spacing-horizontal);
      }
      .grocery-controls {
        flex: 0;
        margin: 0;
      }

      .dropdown {
        position: relative;
        margin-bottom: var(--pico-spacing);

        input {
          margin-bottom: 0;
        }

        ul {
          display: none;
        }

        &.open > ul {
          position: absolute;
          width: 100%;
          display: flex;
          flex-direction: column;
          z-index: 99;
          left: 0;
          white-space: nowrap;
          color: var(--pico-dropdown-color);
          background-color: var(--pico-dropdown-background-color);
          box-shadow: var(--pico-dropdown-box-shadow);
          border: var(--pico-border-width) solid var(--pico-dropdown-border-color);
          border-radius: var(--pico-border-radius);
          margin-top: var(--pico-outline-width);
          margin-bottom: 0;
          padding: 0;

          li {
            list-style-type: none;
            margin: 0;
            padding: var(--pico-block-spacing-horizontal) var(--pico-block-spacing-vertical);
            cursor: pointer;

            &:hover {
              background-color: var(--pico-dropdown-hover-background-color);
            }
          }
        }
      }
    </style>
  </head>
  <body id="app">
  </body>
</html>
