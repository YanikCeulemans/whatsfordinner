[tasks.dev]
run = 'watchexec -e .purs,.js -i output spago bundle --platform browser --bundle-type app'

[tasks.build]
run = 'spago bundle --platform browser --bundle-type app --minify'

[tasks.serve]
run = 'parcel index.html'

[tasks.docs]
run = 'spago docs'

[tasks.docs_serve]
run = 'python -m http.server 8080'
dir = './generated-docs/html/'

[env]
_.path = './node_modules/.bin'

[tools]
node = "22.20.0"
pitchfork = "latest"

# vim: ts=2 sts=2 sw=2 et
